<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>Richiesta Materiale</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Richiesta Materiale</h1>
      <div class="row">
        <div>
          <label>Fornitore</label>
          <input id="supplier" placeholder="Es. Casappa">
        </div>
        <div>
          <label>Operatore</label>
          <input id="operator" placeholder="Tuo nome">
        </div>
      </div>

      <div id="items"></div>

      <div class="actions">
        <button class="primary" id="addRow">+ Riga</button>
        <button id="emailExcel" class="success">Invia Email + Excel</button>
        <button class="danger" id="reset">Svuota</button>
      </div>
    </div>

    <div class="card">
      <textarea id="output" rows="5" placeholder="Testo generato..."></textarea>
      <button id="copy" style="width:100%; margin-top:10px;">Copia Testo</button>
    </div>
  </div>

  <div id="scanModal" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <strong>Scansiona</strong>
        <button class="danger" id="closeScan">X</button>
      </div>
      <div class="video-wrap">
        <video id="scanVideo" playsinline autoplay muted></video>
        <div class="laser"></div>
      </div>
      <div id="scanPill" class="status-pill">Inizializzazione...</div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
